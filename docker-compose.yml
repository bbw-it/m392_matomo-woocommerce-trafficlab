name: m392-matomo-lab

services:
  db:
    image: mariadb:${MARIADB_VERSION}
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Werden vom Init-Script (db/init) gelesen, damit die DB-Benutzer mit den
      # Passwörtern aus .env angelegt werden (kein Hardcoding -> kein Drift).
      WP_DB_NAME: ${WP_DB_NAME}
      WP_DB_USER: ${WP_DB_USER}
      WP_DB_PASSWORD: ${WP_DB_PASSWORD}
      MATOMO_DB_NAME: ${MATOMO_DB_NAME}
      MATOMO_DB_USER: ${MATOMO_DB_USER}
      MATOMO_DB_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:${WORDPRESS_VERSION}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      # Gemeinsames Secret für den Order-API-Endpunkt (mu-plugin m392-order-api.php),
      # über den das Traffic Lab echte WooCommerce-Bestellungen anlegt.
      M392_ORDER_API_KEY: ${M392_ORDER_API_KEY:-m392-order-secret}
      # A/B-Test der Shop-Seite (Variante "Shop-Variante" unter /shop-variante/)
      M392_AB_TEST_ENABLED: ${M392_AB_TEST_ENABLED:-true}
      M392_AB_SPLIT_B: ${M392_AB_SPLIT_B:-50}
      # Host-Port von Matomo: daraus baut der Tracking-Code (mu-plugin
      # matomo-tracking.php) die vom Browser erreichbare URL http://localhost:<Port>/.
      M392_MATOMO_PORT: ${MATOMO_PORT:-8091}
    volumes:
      # Bind-Mount des kompletten WordPress-Docroots auf den Host. So lassen sich
      # Dateien von Hand importieren/bearbeiten (Plugins, Themes, Uploads, wp-config).
      # Wird beim ersten Start vom WordPress-Image befüllt, danach von wp-init.
      - ./wordpress/www:/var/www/html
      - ./wordpress/init/mu-plugins:/var/www/html/wp-content/mu-plugins:ro
    healthcheck:
      # Liveness: Apache antwortet (3xx beim Erststart auf den Installer ist ok).
      # start_period grosszuegig – beim ersten Start kopiert das Image erst den Core.
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  wp-init:
    image: wordpress:cli-${WORDPRESS_CLI_VERSION}
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_PORT: ${WORDPRESS_PORT}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
    volumes:
      - ./wordpress/www:/var/www/html
      - ./wordpress/init/wp-init.sh:/wp-init.sh:ro
      - ./seed/catalog.json:/seed/catalog.json:ro
      - ./wordpress/init/fixture:/fixture:ro
    user: "33:33"
    entrypoint: ["bash", "/wp-init.sh"]
    restart: "no"

  matomo:
    image: matomo:${MATOMO_VERSION}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${MATOMO_PORT}:80"
    environment:
      MATOMO_DATABASE_HOST: db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_DBNAME: ${MATOMO_DB_NAME}
      MATOMO_DATABASE_USERNAME: ${MATOMO_DB_USER}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - matomo_data:/var/www/html
      # M392-Report-Plugins (kostenfreier Ersatz fuer Funnels/A/B-Testing).
      # Read-only ins Plugin-Verzeichnis gemountet; aktiviert werden sie sicher
      # per `console plugin:activate` in install.sh (schreibt die VOLLSTAENDIGE
      # Plugin-Liste inkl. Login – kein Lahmlegen von Matomo).
      - ./matomo/M392ABTesting/plugin:/var/www/html/plugins/M392ABTesting:ro
      - ./matomo/M392Funnels/plugin:/var/www/html/plugins/M392Funnels:ro
    healthcheck:
      # Liveness: Apache antwortet (3xx auf Installer/Login ist ok).
      test: ["CMD-SHELL", "curl -fsS -o /dev/null http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  matomo-init:
    image: curlimages/curl:8.11.1
    depends_on:
      db:
        condition: service_healthy
      matomo:
        condition: service_started
    environment:
      MATOMO_DB_NAME: ${MATOMO_DB_NAME}
      MATOMO_DB_USER: ${MATOMO_DB_USER}
      MATOMO_DB_PASSWORD: ${MATOMO_DB_PASSWORD}
      MATOMO_ADMIN_USER: ${MATOMO_ADMIN_USER}
      MATOMO_ADMIN_PASSWORD: ${MATOMO_ADMIN_PASSWORD}
      MATOMO_ADMIN_EMAIL: ${MATOMO_ADMIN_EMAIL}
      WORDPRESS_PORT: ${WORDPRESS_PORT}
    volumes:
      - matomo_data:/var/www/html
      - ./matomo:/matomo-src:ro          # init-Skript + M392-Plugin-Setups (A/B, Funnels)
      - matomo_token:/token
    user: "0:0"
    entrypoint: ["sh", "/matomo-src/matomo-init.sh"]
    restart: "no"

  traffic:
    build: ./traffic
    restart: unless-stopped
    depends_on:
      matomo:
        condition: service_started
      wordpress:
        condition: service_started
    ports:
      - "127.0.0.1:${TRAFFIC_PORT}:8092"
    environment:
      MATOMO_INTERNAL_URL: http://matomo
      MATOMO_ID_SITE: "1"
      CATALOG_PATH: /seed/catalog.json
      MATOMO_TOKEN_FILE: /token/token_auth
      # Live-Tropf (laufende Besuche/Käufe). Die HISTORIE kommt aus der Fixture
      # (Install: restore + shift), NICHT mehr aus einem Start-Seed. Backen: tools/bake.conf.
      TRAFFIC_LIVE_DRIP: ${TRAFFIC_LIVE_DRIP:-true}
      TRAFFIC_CONVERSION_RATE: ${TRAFFIC_CONVERSION_RATE:-0.014}
      TRAFFIC_RETURNING_RATE: ${TRAFFIC_RETURNING_RATE:-0.08}
      TRAFFIC_DRIP_VISITS_PER_HOUR: ${TRAFFIC_DRIP_VISITS_PER_HOUR:-120}
      # Echte WooCommerce-Bestellungen (über das Order-API-mu-plugin)
      WORDPRESS_INTERNAL_URL: http://wordpress
      M392_ORDER_API_KEY: ${M392_ORDER_API_KEY:-m392-order-secret}
      TRAFFIC_CREATE_WC_ORDERS: ${TRAFFIC_CREATE_WC_ORDERS:-true}
      # A/B-Test: Variante je Besuch + Conversion-Bias (Matomo Custom-Dimension 1)
      M392_AB_TEST_ENABLED: ${M392_AB_TEST_ENABLED:-true}
      M392_AB_SPLIT_B: ${M392_AB_SPLIT_B:-50}
      M392_AB_CONV_FACTOR_B: ${M392_AB_CONV_FACTOR_B:-1.25}
    volumes:
      - ./seed/catalog.json:/seed/catalog.json:ro
      - matomo_token:/token:ro
    healthcheck:
      # python statt curl: das slim-Image bringt kein curl/wget mit.
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:8092/api/status', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
  matomo_data:
  matomo_token:
