name: m392-matomo-lab

services:
  db:
    image: mariadb:${MARIADB_VERSION}
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      # Werden vom Init-Script (db/init) gelesen, damit die DB-Benutzer mit den
      # Passwörtern aus .env angelegt werden (kein Hardcoding -> kein Drift).
      WP_DB_NAME: ${WP_DB_NAME}
      WP_DB_USER: ${WP_DB_USER}
      WP_DB_PASSWORD: ${WP_DB_PASSWORD}
      MATOMO_DB_NAME: ${MATOMO_DB_NAME}
      MATOMO_DB_USER: ${MATOMO_DB_USER}
      MATOMO_DB_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    image: wordpress:${WORDPRESS_VERSION}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      # Gemeinsames Secret für den Order-API-Endpunkt (mu-plugin m392-order-api.php),
      # über den das Traffic Lab echte WooCommerce-Bestellungen anlegt.
      M392_ORDER_API_KEY: ${M392_ORDER_API_KEY:-m392-order-secret}
    volumes:
      # Bind-Mount des kompletten WordPress-Docroots auf den Host. So lassen sich
      # Dateien von Hand importieren/bearbeiten (Plugins, Themes, Uploads, wp-config).
      # Wird beim ersten Start vom WordPress-Image befüllt, danach von wp-init.
      - ./wordpress/www:/var/www/html
      - ./wordpress/init/mu-plugins:/var/www/html/wp-content/mu-plugins:ro

  wp-init:
    image: wordpress:cli-${WORDPRESS_CLI_VERSION}
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${WP_DB_NAME}
      WORDPRESS_DB_USER: ${WP_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WP_DB_PASSWORD}
      WORDPRESS_PORT: ${WORDPRESS_PORT}
      WP_TITLE: ${WP_TITLE}
      WP_LOCALE: ${WP_LOCALE}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WOOCOMMERCE_VERSION: ${WOOCOMMERCE_VERSION}
      SHOP_COUNTRY: ${SHOP_COUNTRY}
      SHOP_CURRENCY: ${SHOP_CURRENCY}
    volumes:
      - ./wordpress/www:/var/www/html
      - ./wordpress/init/wp-init.sh:/wp-init.sh:ro
      - ./seed/catalog.json:/seed/catalog.json:ro
      - ./wordpress/init/fixture:/fixture:ro
    user: "33:33"
    entrypoint: ["bash", "/wp-init.sh"]
    restart: "no"

  matomo:
    image: matomo:${MATOMO_VERSION}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${MATOMO_PORT}:80"
    environment:
      MATOMO_DATABASE_HOST: db
      MATOMO_DATABASE_ADAPTER: mysql
      MATOMO_DATABASE_DBNAME: ${MATOMO_DB_NAME}
      MATOMO_DATABASE_USERNAME: ${MATOMO_DB_USER}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DB_PASSWORD}
    volumes:
      - matomo_data:/var/www/html

  matomo-init:
    image: curlimages/curl:8.11.1
    depends_on:
      db:
        condition: service_healthy
      matomo:
        condition: service_started
    environment:
      MATOMO_DB_NAME: ${MATOMO_DB_NAME}
      MATOMO_DB_USER: ${MATOMO_DB_USER}
      MATOMO_DB_PASSWORD: ${MATOMO_DB_PASSWORD}
      MATOMO_ADMIN_USER: ${MATOMO_ADMIN_USER}
      MATOMO_ADMIN_PASSWORD: ${MATOMO_ADMIN_PASSWORD}
      MATOMO_ADMIN_EMAIL: ${MATOMO_ADMIN_EMAIL}
      WORDPRESS_PORT: ${WORDPRESS_PORT}
    volumes:
      - matomo_data:/var/www/html
      - ./matomo/matomo-init.sh:/matomo-init.sh:ro
      - matomo_token:/token
    user: "0:0"
    entrypoint: ["sh", "/matomo-init.sh"]
    restart: "no"

  traffic:
    build: ./traffic
    restart: unless-stopped
    depends_on:
      matomo:
        condition: service_started
      wordpress:
        condition: service_started
    ports:
      - "${TRAFFIC_PORT}:8092"
    environment:
      MATOMO_INTERNAL_URL: http://matomo
      MATOMO_ID_SITE: "1"
      CATALOG_PATH: /seed/catalog.json
      MATOMO_TOKEN_FILE: /token/token_auth
      TRAFFIC_AUTO_SEED: ${TRAFFIC_AUTO_SEED}
      TRAFFIC_BACKFILL_DAYS: ${TRAFFIC_BACKFILL_DAYS}
      TRAFFIC_LIVE_DRIP: ${TRAFFIC_LIVE_DRIP}
      TRAFFIC_CONVERSION_RATE: ${TRAFFIC_CONVERSION_RATE}
      TRAFFIC_RETURNING_RATE: ${TRAFFIC_RETURNING_RATE:-0.35}
      TRAFFIC_DRIP_VISITS_PER_HOUR: ${TRAFFIC_DRIP_VISITS_PER_HOUR:-120}
      # Echte WooCommerce-Bestellungen (über das Order-API-mu-plugin)
      WORDPRESS_INTERNAL_URL: http://wordpress
      M392_ORDER_API_KEY: ${M392_ORDER_API_KEY:-m392-order-secret}
      TRAFFIC_CREATE_WC_ORDERS: ${TRAFFIC_CREATE_WC_ORDERS:-true}
      # Anzahl echter Bestellungen beim Init, verteilt über das Backfill-Fenster
      # (Standard: passend zur ~24-Monats-Matomo-Historie).
      TRAFFIC_SEED_ORDERS: ${TRAFFIC_SEED_ORDERS:-120}
      TRAFFIC_SEED_ORDERS_DAYS: ${TRAFFIC_SEED_ORDERS_DAYS:-180}
    volumes:
      - ./seed/catalog.json:/seed/catalog.json:ro
      - matomo_token:/token:ro

volumes:
  db_data:
  matomo_data:
  matomo_token:
